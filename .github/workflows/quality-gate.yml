name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    env:
      DATABASE_URI: postgres://postgres:postgres@localhost:5432/arkhitectureweb
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      PAYLOAD_SECRET: ci-quality-gate-secret-value-32chars

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arkhitectureweb
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arkhitectureweb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
